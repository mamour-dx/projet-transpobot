services:
  db:
    image: mysql:8.0
    restart: always
    networks:
      - transpobot_network
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-transpobot}
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    networks:
      - transpobot_network
    env_file:
      - .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: always
    networks:
      - transpobot_network
    depends_on:
      - backend

volumes:
  db_data:

networks:
  transpobot_network:
    name: transpobot-net
    driver: bridge
